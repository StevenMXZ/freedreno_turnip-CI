# Nome do Workflow
name: Build DXVK (Specific Commit) and VKD3D-Proton (x64 & x86)

# Gatilhos (Triggers)
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Prepara o ambiente do workflow
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build glslang-tools

      # 1. Cria os arquivos de cross-compilação para 64 e 32 bits
      - name: Create Meson Cross-Files
        run: |
          # Configuração para 64-bit (x86_64)
          echo """[binaries]
          c = 'x86_64-w64-mingw32-gcc'
          cpp = 'x86_64-w64-mingw32-g++'
          ar = 'x86_64-w64-mingw32-ar'
          strip = 'x86_64-w64-mingw32-strip'
          pkgconfig = 'x86_64-w64-mingw32-pkg-config'
          windres = 'x86_64-w64-mingw32-windres'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          """ > x64_mingw.txt
          
          # Configuração para 32-bit (i686)
          echo """[binaries]
          c = 'i686-w64-mingw32-gcc'
          cpp = 'i686-w64-mingw32-g++'
          ar = 'i686-w64-mingw32-ar'
          strip = 'i686-w64-mingw32-strip'
          pkgconfig = 'i686-w64-mingw32-pkg-config'
          windres = 'i686-w64-mingw32-windres'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          """ > x86_mingw.txt

      # 2. Baixa e extrai a toolchain (compilador)
      - name: Download and Extract Toolchain
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20240929/llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xvf llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          echo "PATH=$(readlink -f llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64/bin):$PATH" >> $GITHUB_ENV

      # 3. Baixa o código-fonte do DXVK usando o método robusto
      - name: Checkout Specific DXVK Commit
        uses: actions/checkout@v4
        with:
          repository: doitsujin/dxvk
          ref: 5c3b5b599f712e3a7bbf0b0d030ff49aa38fa55f
          path: dxvk
          submodules: recursive
          fetch-depth: 0 # CORREÇÃO DEFINITIVA: Baixa todo o histórico

      # 4. Compila o DXVK (ambas as arquiteturas)
      - name: Build DXVK (x64 & x86)
        run: |
          echo "Building DXVK for x64..."
          meson setup --cross-file x64_mingw.txt --buildtype release --prefix $(pwd)/build_output/x64 build_dxvk_x64 dxvk
          ninja -C build_dxvk_x64 install
          
          echo "Building DXVK for x86..."
          meson setup --cross-file x86_mingw.txt --buildtype release --prefix $(pwd)/build_output/x86 build_dxvk_x86 dxvk
          ninja -C build_dxvk_x86 install

      # 5. Compila o VKD3D-Proton (ambas as arquiteturas)
      - name: Build VKD3D-Proton (x64 & x86)
        run: |
          echo "Cloning VKD3D-Proton..."
          git clone --recursive https://github.com/HansKristian-Work/vkd3d-proton.git
          
          echo "Building VKD3D-Proton for x64..."
          meson setup --cross-file x64_mingw.txt --buildtype release --prefix $(pwd)/build_output/x64 build_vkd3d_x64 vkd3d-proton
          ninja -C build_vkd3d_x64 install
          
          echo "Building VKD3D-Proton for x86..."
          meson setup --cross-file x86_mingw.txt --buildtype release --prefix $(pwd)/build_output/x86 build_vkd3d_x86 vkd3d-proton
          ninja -C build_vkd3d_x86 install

      # 6. Faz o upload dos binários compilados
      - name: Upload Binaries as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-vkd3d-builds
          path: build_output/
