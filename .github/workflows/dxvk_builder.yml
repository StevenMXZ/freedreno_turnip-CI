# Nome do Workflow que aparecerá na aba "Actions" do seu repositório
name: Build ARM64EC VKD3D and DXVK

# Gatilhos (Triggers): Quando esta Action deve rodar?
on:
  # Permite que você inicie a Action manualmente pela interface do GitHub
  workflow_dispatch:

  # Roda automaticamente sempre que você enviar um 'push' para a branch 'main'
  push:
    branches:
      - main

# Define os 'jobs' (trabalhos) que o workflow vai executar
jobs:
  build:
    # O tipo de máquina virtual para rodar o job. 'ubuntu-latest' é x86_64 Linux.
    runs-on: ubuntu-latest

    # A sequência de passos que o job vai executar
    steps:
      # 1. Clona seu repositório para a máquina virtual (necessário para acessar o cross-file)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instala dependências essenciais que podem não vir por padrão
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      # 3. Cria o arquivo de cross-compilação do Meson
      - name: Create Meson Cross-File
        run: |
          echo """[binaries]
          ar = 'arm64ec-w64-mingw32-ar'
          c = 'arm64ec-w64-mingw32-gcc'
          cpp = 'arm64ec-w64-mingw32-g++'
          ld = 'arm64ec-w64-mingw32-ld'
          windres = 'arm64ec-w64-mingw32-windres'
          strip = 'strip'
          widl = 'arm64ec-w64-mingw32-widl'
          pkgconfig = 'aarch64-linux-gnu-pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'""" > arm64ec_x86.txt

      # 4. Baixa e extrai a toolchain (compilador)
      - name: Download and Extract Toolchain
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20240929/llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xvf llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          # Adiciona o caminho da toolchain ao ambiente para os próximos passos
          echo "$(readlink -f llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64/bin)" >> $GITHUB_ENV

      # 5. Compila o DXVK
      - name: Build DXVK
        run: |
          git clone --recursive https://github.com/doitsujin/dxvk.git
          meson setup --cross-file $(pwd)/arm64ec_x86.txt --buildtype release --prefix $(pwd)/dxvk_arm64ec_out/ build_dxvk_arm64ec dxvk
          ninja -C build_dxvk_arm64ec/ install

      # 6. Compila o VKD3D-Proton
      - name: Build VKD3D-Proton
        run: |
          git clone --recursive https://github.com/HansKristian-Work/vkd3d-proton.git
          cd vkd3d-proton
          # Submódulos precisam ser iniciados separadamente em alguns casos
          ./setup-test-deps.sh
          cd ..
          meson setup --cross-file $(pwd)/arm64ec_x86.txt --buildtype release --prefix $(pwd)/vkd3d_arm64ec_out/ build_vkd3d_arm64ec vkd3d-proton
          ninja -C build_vkd3d_arm64ec/ install

      # 7. Faz o upload dos binários compilados como um 'artefato'
      - name: Upload Binaries as Artifact
        uses: actions/upload-artifact@v4
        with:
          # Nome do arquivo ZIP que será gerado
          name: arm64ec-builds
          # Caminho dos diretórios que serão incluídos no ZIP
          path: |
            dxvk_arm64ec_out/
            vkd3d_arm64ec_out/
