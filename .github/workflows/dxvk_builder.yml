# Nome do Workflow
name: Build ARM64EC & x86 DXVK and VKD3D-Proton

# Gatilhos (Triggers)
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build glslang-tools wine64-tools

      # 1. Cria os arquivos de cross-compilação para ARM64EC e 32-bit x86
      - name: Create Meson Cross-Files
        run: |
          # Configuração para ARM64EC (64-bit)
          echo """[binaries]
          c = 'arm64ec-w64-mingw32-gcc'
          cpp = 'arm64ec-w64-mingw32-g++'
          ar = 'arm64ec-w64-mingw32-ar'
          strip = 'arm64ec-w64-mingw32-strip'
          pkgconfig = 'arm64ec-w64-mingw32-pkg-config'
          windres = 'arm64ec-w64-mingw32-windres'
          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'arm64ec'
          endian = 'little'
          """ > arm64ec_mingw.txt
          
          # Configuração para 32-bit (i686 / x86)
          echo """[binaries]
          c = 'i686-w64-mingw32-gcc'
          cpp = 'i686-w64-mingw32-g++'
          ar = 'i686-w64-mingw32-ar'
          strip = 'i686-w64-mingw32-strip'
          pkgconfig = 'i686-w64-mingw32-pkg-config'
          windres = 'i686-w64-mingw32-windres'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          """ > x86_mingw.txt

      # 2. Baixa e extrai a toolchain (compilador)
      - name: Download and Extract Toolchain
        run: |
          wget https://github.com/bylaws/llvm-mingw/releases/download/20240929/llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xvf llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64.tar.xz
          echo "PATH=$(readlink -f llvm-mingw-20240929-ucrt-ubuntu-20.04-x86_64/bin):$PATH" >> $GITHUB_ENV

      # 3. Baixa o código-fonte do DXVK do commit específico
      - name: Checkout Specific DXVK Commit
        uses: actions/checkout@v4
        with:
          repository: doitsujin/dxvk
          ref: 5c3b5b599f712e3a7bbf0b0d030ff49aa38fa55f
          path: dxvk
          submodules: recursive
          fetch-depth: 0

      # 4. Compila o DXVK (ARM64EC e x86)
      - name: Build DXVK (ARM64EC & x86)
        run: |
          echo "Building DXVK for ARM64EC..."
          meson setup --cross-file arm64ec_mingw.txt --buildtype release --prefix $(pwd)/build_output/arm64ec build_dxvk_arm64ec dxvk
          ninja -C build_dxvk_arm64ec install
          
          echo "Building DXVK for x86..."
          meson setup --cross-file x86_mingw.txt --buildtype release --prefix $(pwd)/build_output/x86 build_dxvk_x86 dxvk
          ninja -C build_dxvk_x86 install

      # 5. Compila o VKD3D-Proton (ARM64EC e x86)
      - name: Build VKD3D-Proton (ARM64EC & x86)
        run: |
          echo "Cloning VKD3D-Proton..."
          git clone --recursive https://github.com/HansKristian-Work/vkd3d-proton.git
          
          echo "Building VKD3D-Proton for ARM64EC..."
          meson setup --cross-file arm64ec_mingw.txt --buildtype release --prefix $(pwd)/build_output/arm64ec build_vkd3d_arm64ec vkd3d-proton
          ninja -C build_vkd3d_arm64ec install
          
          echo "Building VKD3D-Proton for x86..."
          meson setup --cross-file x86_mingw.txt --buildtype release --prefix $(pwd)/build_output/x86 build_vkd3d_x86 vkd3d-proton
          ninja -C build_vkd3d_x86 install

      # 6. Faz o upload dos binários compilados
      - name: Upload Binaries as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64ec-x86-builds
          path: build_output/
