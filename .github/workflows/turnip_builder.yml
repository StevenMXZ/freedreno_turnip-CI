# Nome do Workflow que aparecerá na aba "Actions" do GitHub
name: Build and Release Turnip Driver

# Define os gatilhos que iniciam o workflow
on:
  # Permite que você inicie este workflow manualmente a partir da aba Actions
  workflow_dispatch:

  # Também inicia o workflow em cada push para o branch 'main'
  push:
    branches:
      - "main"

# Define os trabalhos (jobs) que o workflow irá executar
jobs:
  build:
    # O tipo de máquina virtual que o trabalho irá rodar
    runs-on: ubuntu-latest

    # A sequência de passos que o trabalho executará
    steps:
      # Passo 1: Clona o seu repositório para a máquina virtual
      - name: Checkout repository
        uses: actions/checkout@v4

      # Passo 2: Executa o script de build principal
      - name: Run Turnip Builder Script
        run: bash ./turnip_builder.sh

      # PASSO 3 (NOVO): LISTAR ARQUIVOS PARA DEPURAÇÃO
      # Este passo nos mostrará se os arquivos .zip realmente existem.
      - name: List Build Artifacts for Debugging
        run: |
          echo "Listing contents of turnip_workdir to find our zip files..."
          ls -R turnip_workdir

      # Passo 4: Lê os arquivos de informação gerados pelo script
      - name: Get Release Info
        id: get_info
        run: |
          echo "--- Reading release info files ---"
          echo "TAG_NAME=$(cat turnip_workdir/tag)" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=Release $(cat turnip_workdir/tag)" >> $GITHUB_OUTPUT
          echo "BODY_PATH=turnip_workdir/description" >> $GITHUB_OUTPUT
          
          echo "Searching for zip files in turnip_workdir..."
          zip_files=$(find turnip_workdir -name '*.zip' | tr '\n' ' ')
          echo "Found files: [${zip_files}]" # Log para depuração
          echo "ZIP_FILES=${zip_files}" >> $GITHUB_OUTPUT
          echo "------------------------------------"

      # Passo 5: Usa uma Ação para criar la Release no GitHub
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_info.outputs.TAG_NAME }}
          release_name: ${{ steps.get_info.outputs.RELEASE_NAME }}
          body_path: ${{ steps.get_info.outputs.BODY_PATH }}
          files: ${{ steps.get_info.outputs.ZIP_FILES }}
          draft: true
          prerelease: false
